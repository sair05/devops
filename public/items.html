<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Fruits</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 20px; text-align: center; border-radius: 8px; }
        .price { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Available Fruits</h1>
    <div class="grid">
        <div class="card"><h3>🍎 Apple</h3><p class="price">$2.00 / kg</p></div>
        <div class="card"><h3>🍌 Banana</h3><p class="price">$1.00 / kg</p></div>
        <div class="card"><h3>🍊 Orange</h3><p class="price">$3.00 / kg</p></div>
        <div class="card"><h3>🥭 Mango</h3><p class="price">$5.00 / kg</p></div>
    </div>
    <br>
    <a href="/">Go Back Home</a>
</body>
</html>
